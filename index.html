<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:linear-gradient(180deg,#09111f,#141b33,#1b2445);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Georgia, serif;
            overflow:hidden;
            color:white;
        }

        .contenedor{
            text-align:center;
            animation:aparecer 2s;
            padding:30px;
        }

        h1{
            font-size:55px;
            margin-bottom:20px;
            font-weight:normal;
        }

        p{
            font-size:20px;
            opacity:.9;
            margin-bottom:40px;
        }

        button{
            padding:15px 40px;
            font-size:18px;
            border:none;
            border-radius:40px;
            background:white;
            color:#1b2445;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.08);
        }

        @keyframes aparecer{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .estrella{
            position:absolute;
            background:white;
            border-radius:50%;
            animation:brillar infinite alternate;
        }

        @keyframes brillar{
            from{opacity:.2;}
            to{opacity:1;}
        }
    </style>
</head>

<body>

<div class="contenedor">

    <h1>Para ti ❤️</h1>

    <p>
        Hay cosas que no quería que se quedaran solamente en mi memoria.
    </p>

    <button onclick="alert('Próximamente se abrirá tu carta 💌')">
        Abrir
    </button>

</div>

<script>

for(let i=0;i<120;i++){

    let estrella=document.createElement("div");

    estrella.className="estrella";

    let size=Math.random()*3+1;

    estrella.style.width=size+"px";
    estrella.style.height=size+"px";

    estrella.style.left=Math.random()*100+"vw";
    estrella.style.top=Math.random()*100+"vh";

    estrella.style.animationDuration=(Math.random()*3+1)+"s";

    document.body.appendChild(estrella);

}

</script>

</body>
</html>
