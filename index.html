<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(180deg,#09111f,#141b33,#1b2445);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Georgia, serif;
    overflow:hidden;
    color:white;
}


/* ESTRELLAS */

.estrella{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:brillar infinite alternate;
}

@keyframes brillar{
    from{opacity:.2;}
    to{opacity:1;}
}


/* PORTADA */

.contenedor{
    text-align:center;
    padding:30px;
    animation:aparecer 2s;
    transition:2s;
    z-index:2;
}

h1{
    font-size:55px;
    font-weight:normal;
    margin-bottom:20px;
}

p{
    font-size:20px;
    opacity:.9;
    margin-bottom:40px;
}

button{
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:white;
    color:#1b2445;
    cursor:pointer;
    transition:.5s;
}

button:hover{
    transform:scale(1.08);
}


@keyframes aparecer{

from{
    opacity:0;
    transform:translateY(30px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}


/* NUEVA ESCENA */

.recuerdo{
    position:absolute;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:2s;
    padding:30px;
    z-index:3;
}


.recuerdo.mostrar{
    opacity:1;
}


.frase{
    font-size:28px;
    line-height:1.5;
    max-width:500px;
    margin:auto;
}


/* SOBRE */

.sobre{
    margin:50px auto 0;
    width:120px;
    height:80px;
    background:#fff;
    position:relative;
    border-radius:8px;
    cursor:pointer;
    animation:flotar 2s infinite alternate;
}


.sobre:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    border-left:60px solid transparent;
    border-right:60px solid transparent;
    border-top:45px solid #d8d8d8;
}


.sobre:after{
    content:"❤️";
    position:absolute;
    font-size:35px;
    left:42px;
    top:25px;
}


@keyframes flotar{

from{
    transform:translateY(0);
}

to{
    transform:translateY(-15px);
}

}


.ocultar{
    opacity:0;
    transform:scale(.8);
    pointer-events:none;
}


</style>

</head>


<body>


<div class="contenedor" id="inicio">

<h1>Santander ❤️</h1>

<p>
Hay cosas que no quería que se quedaran solamente en mi memoria.
</p>

<button onclick="entrar()">
Entrar
</button>

</div>



<div class="recuerdo" id="recuerdo">

<div class="frase">

Gracias por hacerme sentir en casa cuando estaba tan lejos de la mía.

</div>


<div class="sobre"></div>


</div>



<script>


// crear estrellas

for(let i=0;i<120;i++){

let estrella=document.createElement("div");

estrella.className="estrella";

let size=Math.random()*3+1;

estrella.style.width=size+"px";
estrella.style.height=size+"px";

estrella.style.left=Math.random()*100+"vw";
estrella.style.top=Math.random()*100+"vh";

estrella.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(estrella);

}



// transición

function entrar(){

let inicio=document.getElementById("inicio");
let recuerdo=document.getElementById("recuerdo");


inicio.classList.add("ocultar");


setTimeout(()=>{

recuerdo.classList.add("mostrar");

},1500);


}


</script>


</body>
</html>
